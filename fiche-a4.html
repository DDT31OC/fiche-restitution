<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fiche de restitution</title>
<script src="https://grist.numerique.gouv.fr/grist-plugin-api.js"></script>
<style>
  /* ---------------------------------------------------------------
     Police Marianne (DSFR). Chargée depuis le CDN officiel.
     Repli : Arial (substitut autorisé par la charte en bureautique).
     >> Réseau qui bloque le CDN ? Téléchargez le zip du DSFR, mettez
        les .woff2 dans un dossier "fonts/" de votre dépôt GitHub, et
        remplacez le préfixe d'URL ci-dessous par :  fonts/
     --------------------------------------------------------------- */
  @font-face{font-family:'Marianne';font-weight:400;font-style:normal;font-display:swap;
    src:url('https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.2/dist/fonts/Marianne-Regular.woff2') format('woff2')}
  @font-face{font-family:'Marianne';font-weight:500;font-style:normal;font-display:swap;
    src:url('https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.2/dist/fonts/Marianne-Medium.woff2') format('woff2')}
  @font-face{font-family:'Marianne';font-weight:700;font-style:normal;font-display:swap;
    src:url('https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.2/dist/fonts/Marianne-Bold.woff2') format('woff2')}
  @font-face{font-family:'Marianne';font-weight:400;font-style:italic;font-display:swap;
    src:url('https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.13.2/dist/fonts/Marianne-Regular_Italic.woff2') format('woff2')}

  :root{
    --bleu-france:#000091;   /* Bleu France (DSFR) */
    --rouge:#e1000f;         /* Rouge Marianne */
    --encre:#161616;         /* grey-1000 */
    --gris-label:#666666;    /* grey-425 */
    --filet:#dddddd;         /* grey-900-175 */
    --fond-ecran:#eeeeee;
    --papier:#ffffff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Marianne',Arial,sans-serif;
    color:var(--encre); background:var(--fond-ecran);
    -webkit-print-color-adjust:exact; print-color-adjust:exact;
  }

  /* Barre d'action (écran uniquement) */
  .toolbar{position:fixed; top:12px; right:16px; z-index:10}
  .btn{
    font-family:inherit; font-size:14px; font-weight:500; cursor:pointer;
    border:1px solid var(--bleu-france); background:var(--bleu-france); color:#fff;
    padding:.55rem 1rem; border-radius:0;
  }
  .btn:hover{background:#1212ff}
  .btn:focus-visible{outline:2px solid #0a76f6; outline-offset:2px}

  /* Feuille A4 */
  .page{
    background:var(--papier); width:210mm; min-height:297mm;
    margin:24px auto; padding:16mm 16mm 16mm;
    box-shadow:0 2px 18px rgba(0,0,0,.12);
  }

  /* En-tête : bloc-marque à gauche, titre à droite */
  .entete{display:flex; justify-content:space-between; align-items:flex-start; gap:24px}
  .bloc-marque{
    font-weight:700; text-transform:uppercase; font-size:15px; line-height:1.05;
    letter-spacing:.01em; margin:0; color:var(--encre);
  }
  .devise{font-style:italic; font-size:10px; color:#3a3a3a; margin:4px 0 0}
  .service{
    font-weight:500; font-size:12.5px; line-height:1.25; color:var(--encre);
    margin:12px 0 0; max-width:70mm;
  }
  .marque img{max-height:80px; max-width:78mm; width:auto; height:auto; display:block}
  .doc{text-align:right; padding-top:2px}
  .surtitre{
    font-size:11px; font-weight:500; letter-spacing:.12em; text-transform:uppercase;
    color:var(--gris-label); margin:0 0 4px;
  }
  .titre{font-size:24px; font-weight:700; color:var(--bleu-france); margin:0; line-height:1.15}
  .filet{height:2px; background:var(--bleu-france); border:0; margin:14px 0 0}
  .objet{font-size:12.5px; line-height:1.35; color:var(--encre); margin:12px 0 0}
  .objet strong{font-weight:700}

  /* Sections */
  .section{margin-top:22px; break-inside:avoid}
  .section > h2{
    font-size:12px; font-weight:500; letter-spacing:.08em; text-transform:uppercase;
    color:var(--bleu-france); margin:0 0 8px; padding-bottom:6px;
    border-bottom:1px solid var(--filet);
  }
  .kv{
    display:grid; grid-template-columns:38% 62%; gap:2px 16px;
    padding:6px 0; break-inside:avoid; border-bottom:1px dotted var(--filet);
  }
  .kv:last-child{border-bottom:0}
  .kv .label{color:var(--gris-label); font-size:13px}
  .kv .value{font-size:14px; white-space:pre-wrap; word-break:break-word}
  .value.vide{color:#b0b0b0}

  /* Pied */
  .pied{
    margin-top:26px; padding-top:8px; border-top:1px solid var(--filet);
    font-size:10.5px; color:var(--gris-label); display:flex; justify-content:space-between;
  }

  /* États */
  .message{max-width:520px; margin:80px auto; text-align:center; color:var(--gris-label)}
  .note{
    background:#fff4d6; border-left:4px solid #e5c400; color:#5a4b00;
    font-size:12px; padding:8px 12px; margin:0 0 14px;
  }

  @page{ size:A4; margin:14mm 16mm; }
  @media print{
    body{background:#fff}
    .toolbar,.note{display:none}
    .page{width:auto; min-height:auto; margin:0; padding:0; box-shadow:none}
  }
</style>
</head>
<body>

<div class="toolbar">
  <button class="btn" id="btn-print" type="button">Imprimer / Enregistrer en PDF</button>
</div>

<div id="app"><div class="message">Chargement de la fiche…</div></div>

<script>
/* =========================================================
   CONFIGURATION  —  seule cette partie est à personnaliser
   ========================================================= */
const CONFIG = {
  titre:    "Fiche de restitution",
  surtitre: "Lettre de mission · mode projet « flash »",
  service:  "Direction départementale des territoires\nde la Haute-Garonne",
  objet:    "Désignation d’un chef de projet et mise en place d’une équipe-projet pour mener un projet transversal.",

  // Bloc-marque officiel en IMAGE (optionnel). Récupérable sur info.gouv.fr.
  logoUrl:  "",
  autoImpression: false,
  masquerAutres: true,   // n'affiche QUE les champs listés dans "sections" (fiche = formulaire)

  colonnesMasquees: ["fiche_markdown", "cle_impression", "manualSort"],
  colonnesDate: ["Date_lettre", "Date_lancement", "Date_fin_envisagee",
                 "Date_soumission", "date_cloture_effective"],

  libelles: {
    Nom_projet:    "Nom du projet",
    Porteur_projet:"Porteur de projet",
    Localisation:  "Localisation",
    Cheffe_projet: "Chef(fe) de projet",
    Date_lettre:   "Date de la lettre",

    Critere_plusieurs_procedures: "Transversalité",
    Critere_complexite:           "Complexité",
    Critere_mobilisation_reactive:"Temporalité",
    Critere_arbitrage:            "Nécessité d’arbitrage",
    Critere_enjeu_politique:      "Enjeu politique",
    Critere_procedure_innovante:  "Innovation",
    Autres_criteres_facultatifs_pertinents: "Autres critères facultatifs pertinents",

    SEEF_actif:  "Service Environnement Eau et Forêt (SEEF)",
    SEA_actif:   "Service Économie Agricole (SEA)",
    SRGC_actif:  "Service Risques et Gestion de Crises (SRGC)",
    SLCD_actif:  "Service Logement et Construction Durables (SLCD)",
    ST_actif:    "Service Territorial (ST)",
    MAJC_actif:  "Mission Affaires Juridiques et Contrôles (MAJC)",
    MICIP_actif: "Mission Connaissance Innovation Pilotage (MICIP)",
    SEEF_agents:  "Agents mobilisés – SEEF",
    SEA_agents:   "Agents mobilisés – SEA",
    SRGC_agents:  "Agents mobilisés – SRGC",
    SLCD_agents:  "Agents mobilisés – SLCD",
    ST_agents:    "Agents mobilisés – ST",
    MAJC_agents:  "Agents mobilisés – MAJC",
    MICIP_agents: "Agents mobilisés – MICIP",

    Objectif:           "Objectif",
    Livrables:          "Livrables",
    Date_lancement:     "Date de lancement",
    Date_fin_envisagee: "Date de fin envisagée",

    etat_d_avancement:                            "État d’avancement",
    echeances_intermediaires:                     "Échéances intermédiaires",
    points_de_vigilance_sur_l_etat_d_avancement:  "Points de vigilance",
    procedures_responsable_DDT_ou_non:            "Procédures : responsable DDT ou non",
    Enjeux_DDT_thematiques:                       "Enjeux DDT / thématiques",
    commentaires:                                 "Commentaires",
    liens_vers_documents_sur_serveur:             "Liens vers les documents (serveur)",

    Validation_Direction:  "Validation Direction",
    Lettre_mission_validee:"Lettre de mission validée",
    Statut_completude:     "Complétude",
    Date_soumission:       "Date de soumission",
    date_cloture_effective:"Date de clôture effective",
  },

  sections: [
    { titre: "Informations", colonnes: [
        "Nom_projet", "Porteur_projet", "Localisation", "Cheffe_projet", "Date_lettre" ] },

    { titre: "Critères obligatoires", colonnes: [
        "Critere_plusieurs_procedures", "Critere_complexite" ] },

    { titre: "Critères facultatifs", colonnes: [
        "Critere_mobilisation_reactive", "Critere_arbitrage",
        "Critere_enjeu_politique", "Critere_procedure_innovante" ] },

    { titre: "Services mobilisés", colonnes: [
        "SEEF_actif", "SEEF_agents", "SEA_actif", "SEA_agents",
        "SRGC_actif", "SRGC_agents", "SLCD_actif", "SLCD_agents",
        "ST_actif", "ST_agents", "MAJC_actif", "MAJC_agents",
        "MICIP_actif", "MICIP_agents" ] },

    { titre: "Objectifs et livrables", colonnes: [
        "Objectif", "Livrables", "Date_lancement", "Date_fin_envisagee" ] },
  ],
};
/* ===================== FIN CONFIG ========================= */


const app = document.getElementById("app");

function prettifier(colId){ return String(colId).replace(/_/g, " "); }

function normalise(s){
  return String(s).normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .toLowerCase().replace(/[^a-z0-9]+/g, "");
}

function estVide(v){
  return v === null || v === undefined || v === "" ||
         (Array.isArray(v) && v.length === 0);
}

function formaterDate(d){
  const j = String(d.getDate()).padStart(2, "0");
  const m = String(d.getMonth() + 1).padStart(2, "0");
  return j + "/" + m + "/" + d.getFullYear();
}

function formaterValeur(colId, v){
  if (estVide(v)) return { texte: "—", vide: true };
  if (typeof v === "boolean") return { texte: v ? "Oui" : "Non", vide: false };
  if (v instanceof Date) return { texte: formaterDate(v), vide: false };
  if (typeof v === "number" && CONFIG.colonnesDate.includes(colId))
    return { texte: formaterDate(new Date(v * 1000)), vide: false };
  if (Array.isArray(v)){
    const items = v[0] === "L" ? v.slice(1) : v;
    return { texte: items.join(", "), vide: false };
  }
  return { texte: String(v), vide: false };
}

function ligneKV(colId, valeur){
  const label = CONFIG.libelles[colId] || prettifier(colId);
  const { texte, vide } = formaterValeur(colId, valeur);
  const el = document.createElement("div");
  el.className = "kv";
  el.innerHTML = '<div class="label"></div><div class="value' + (vide ? " vide" : "") + '"></div>';
  el.querySelector(".label").textContent = label;
  el.querySelector(".value").textContent = texte;
  return el;
}

function bloc(titre, colonnes, record){
  const section = document.createElement("section");
  section.className = "section";
  if (titre){
    const h = document.createElement("h2");
    h.textContent = titre;
    section.appendChild(h);
  }
  colonnes.forEach(colId => section.appendChild(ligneKV(colId, record[colId])));
  return section;
}

function colonnesAffichables(record){
  const masquees = new Set(CONFIG.colonnesMasquees.concat(["id"]));
  return Object.keys(record).filter(c =>
    !masquees.has(c) && !c.startsWith("gristHelper_") && !c.startsWith("_"));
}

function entete(){
  const h = document.createElement("header");
  h.className = "entete";

  const marque = document.createElement("div");
  marque.className = "marque";
  if (CONFIG.logoUrl){
    const img = document.createElement("img");
    img.src = CONFIG.logoUrl; img.alt = "République Française";
    marque.appendChild(img);
  } else {
    const bm = document.createElement("p");
    bm.className = "bloc-marque";
    bm.innerHTML = "République<br>Française";
    const dev = document.createElement("p");
    dev.className = "devise";
    dev.textContent = "Liberté · Égalité · Fraternité";
    marque.appendChild(bm); marque.appendChild(dev);
  }
  if (CONFIG.service){
    const s = document.createElement("p");
    s.className = "service";
    s.textContent = CONFIG.service;
    marque.appendChild(s);
  }

  const doc = document.createElement("div");
  doc.className = "doc";
  doc.innerHTML =
    (CONFIG.surtitre ? '<p class="surtitre"></p>' : "") + '<h1 class="titre"></h1>';
  if (CONFIG.surtitre) doc.querySelector(".surtitre").textContent = CONFIG.surtitre;
  doc.querySelector(".titre").textContent = CONFIG.titre || "Fiche";

  h.appendChild(marque); h.appendChild(doc);
  return h;
}

function rendreFiche(record, plusieurs){
  const dispo = colonnesAffichables(record);
  const page = document.createElement("div");
  page.className = "page";

  if (plusieurs){
    const note = document.createElement("p");
    note.className = "note";
    note.textContent = "Plusieurs fiches sont visibles ici : la première est affichée. En usage normal (lien avec clé), une seule fiche apparaît.";
    page.appendChild(note);
  }

  page.appendChild(entete());
  const filet = document.createElement("hr");
  filet.className = "filet";
  page.appendChild(filet);

  if (CONFIG.objet){
    const o = document.createElement("p");
    o.className = "objet";
    o.innerHTML = "<strong>Objet :</strong> ";
    o.appendChild(document.createTextNode(CONFIG.objet));
    page.appendChild(o);
  }

  const parNorm = {};
  dispo.forEach(c => { parNorm[normalise(c)] = c; });
  const resoudre = nom => parNorm[normalise(nom)];

  const utilisees = new Set();
  if (CONFIG.sections.length){
    CONFIG.sections.forEach(sec => {
      const cols = (sec.colonnes || []).map(resoudre).filter(c => c && !utilisees.has(c));
      cols.forEach(c => utilisees.add(c));
      if (cols.length) page.appendChild(bloc(sec.titre, cols, record));
    });
    const reste = dispo.filter(c => !utilisees.has(c));
    if (reste.length && !CONFIG.masquerAutres) page.appendChild(bloc("Autres informations", reste, record));
  } else {
    page.appendChild(bloc("", dispo, record));
  }

  const pied = document.createElement("footer");
  pied.className = "pied";
  const g = document.createElement("span");
  g.textContent = "RÉPUBLIQUE FRANÇAISE";
  const d = document.createElement("span");
  d.textContent = "Éditée le " + formaterDate(new Date());
  pied.appendChild(g); pied.appendChild(d);
  page.appendChild(pied);

  app.innerHTML = "";
  app.appendChild(page);

  if (CONFIG.autoImpression) setTimeout(() => window.print(), 400);
}

function messageVide(){
  app.innerHTML = '<div class="message">Aucune fiche à afficher.<br>' +
    'Ouvrez cette page via le lien généré après l’envoi du formulaire.</div>';
}

document.getElementById("btn-print").addEventListener("click", () => window.print());

if (typeof grist === "undefined"){
  app.innerHTML = '<div class="message">Impossible de charger l’API Grist.<br>' +
    'Cette page doit être ajoutée comme « widget personnalisé » dans Grist.</div>';
} else {
  grist.ready({ requiredAccess: "read table" });
  grist.onRecords(function(records){
    if (!records || records.length === 0){ messageVide(); return; }
    rendreFiche(records[0], records.length > 1);
  });
}
</script>
</body>
</html>
